<!DOCTYPE html>
<html lang="en" th:replace="~{layout/base :: layout(~{::content})}" xmlns:th="http://www.thymeleaf.org">

<div class="flex-c align-items-center" th:fragment="content">


    <div class="flex-box w80 justify-content-space-between">

        <!-- м •л ¬ -->
        <div>
            <a th:if="${#strings.isEmpty(searchDTO.content)}"
               th:href="@{/post(postType=${postType},sort='createTime')}">мөңмӢ мҲң</a>
            <a th:unless="${#strings.isEmpty(searchDTO.content)}"
               th:href="@{/search(type=${searchDTO.type},content=${searchDTO.content},postType=${postType},sort='createTime')}">мөңмӢ мҲң</a>

            <a th:if="${#strings.isEmpty(searchDTO.content)}"
               th:href="@{/post(postType=${postType},sort='viewCount')}">мЎ°нҡҢмҲң</a>
            <a th:unless="${#strings.isEmpty(searchDTO.content)}"
               th:href="@{/search(type=${searchDTO.type},content=${searchDTO.content},postType=${postType},sort='viewCount')}">мЎ°нҡҢмҲң</a>

            <a th:if="${#strings.isEmpty(searchDTO.content)}"
               th:href="@{/post(postType=${postType},sort='recommendedNumber')}">м¶”мІңмҲң</a>
            <a th:unless="${#strings.isEmpty(searchDTO.content)}"
               th:href="@{/search(type=${searchDTO.type},content=${searchDTO.content},postType=${postType},sort='recommendedNumber')}">м¶”мІңмҲң</a>
        </div>

        <!-- кІҖмғү нҸј -->
        <form class="flex-box" th:action="@{/post/search}" method="get">
            <div style="vertical-align: bottom" class="text-center">
                <label class="radio-inline">
                    <input type="radio" name="type" value="TITLE"
                           th:checked="${searchDTO != null and searchDTO.type == 'TITLE'}"> м ңлӘ©
                </label>

                <label class="radio-inline">
                    <input type="radio" name="type" value="NICKNAME"
                           th:checked="${searchDTO != null and searchDTO.type == 'NICKNAME'}"> мһ‘м„ұмһҗ
                </label>

                <label class="radio-inline">
                    <input type="radio" name="type" value="CONTENT"
                           th:checked="${searchDTO != null and searchDTO.type == 'CONTENT'}"> лӮҙмҡ©
                </label>

                <label class="radio-inline">
                    <input type="radio" name="type" value="TITLE_CONTENT"
                           th:checked="${searchDTO != null and searchDTO.type == 'TITLE_CONTENT'}"> м ңлӘ©+лӮҙмҡ©
                </label>
            </div>

            <input type="text" class="w20 form-control" name="content"
                   th:value="${searchDTO != null ? searchDTO.content : ''}" placeholder="кІҖмғүм–ҙ мһ…л Ҙ">
            <input type="hidden" name="postType" th:value="${postType}">
            <button class="col-md-1 btn btn-primary" type="submit">кІҖмғү</button>
        </form>
    </div>

    <!-- кІҢмӢңнҢҗ н…Ңмқҙлё” -->
    <table class="table table-bordered w80">
        <thead>
        <tr>
            <th scope="col" class="col-md-6 text-center">м ңлӘ©</th>
            <th scope="col" class="col-md-2 text-center">кёҖм“ҙмқҙ</th>
            <th scope="col" class="col-md-2 text-center">лӮ м§ң</th>
            <th scope="col" class="col-md-1 text-center">мЎ°нҡҢмҲҳ</th>
            <th scope="col" class="col-md-1 text-center">м¶”мІң</th>
        </tr>
        </thead>

        <tbody class="text-center">
        <tr th:each="post : ${posts.getDtoList()}">
            <td class="text-left">
                <a th:href="@{/post/{id}(id=${post.id})}"
                   th:utext="${post.title}">м ңлӘ©</a>
                <span th:if="${post.commentNum != 0}"> [[${post.commentNum}]]</span>
            </td>
            <td th:text="${post.nickname}">мһ‘м„ұмһҗ</td>
            <td th:text="${#temporals.format(post.createTime, 'yyyy/MM/dd HH:mm')}">2025-01-01</td>
            <td th:text="${post.viewCount}">1</td>
            <td th:text="${post.recommendedNumber}">0</td>
        </tr>
        </tbody>
    </table>

    <!-- кёҖм“°кё° лІ„нҠј -->
    <div class="flex-box justify-content-end w80">
        <a class="btn btn-default" th:href="@{/post/write}">кёҖм“°кё°</a>
    </div>

    <!-- нҺҳмқҙм§Җл„Өмқҙм…ҳ -->
    <nav>
        <ul class="pagination">
            <li th:if="${posts.pageInfo.prev}">
                <a th:if="${#strings.isEmpty(searchDTO.content)}"
                   th:href="@{/post(page=${posts.pageInfo.start - 1},postType=${postType},sort=${sort})}">&laquo;</a>
                <a th:unless="${#strings.isEmpty(searchDTO.content)}"
                   th:href="@{/search(page=${posts.pageInfo.start - 1},type=${searchDTO.type},content=${searchDTO.content},postType=${postType},sort=${sort})}">&laquo;</a>
            </li>

            <li th:class="${posts.pageInfo.now == num ? 'active':''}"
                th:each="num: ${posts.pageInfo.pageList}">
                <a th:if="${#strings.isEmpty(searchDTO.content)}"
                   th:href="@{/post(page=${num},postType=${postType},sort=${sort})}" th:text="${num}"></a>
                <a th:unless="${#strings.isEmpty(searchDTO.content)}"
                   th:href="@{/search(page=${num},type=${searchDTO.type},content=${searchDTO.content},postType=${postType},sort=${sort})}" th:text="${num}"></a>
            </li>

            <li th:if="${posts.pageInfo.next}">
                <a th:if="${#strings.isEmpty(searchDTO.content)}"
                   th:href="@{/post(page=${posts.pageInfo.end + 1},postType=${postType},sort=${sort})}">&raquo;</a>
                <a th:unless="${#strings.isEmpty(searchDTO.content)}"
                   th:href="@{/search(page=${posts.pageInfo.end + 1},type=${searchDTO.type},content=${searchDTO.content},postType=${postType},sort=${sort})}">&raquo;</a>
            </li>
        </ul>
    </nav>

</div>
</html>
