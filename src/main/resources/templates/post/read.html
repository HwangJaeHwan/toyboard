<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::content})}">

<div class="flex-box justify-content-center" th:fragment="content">
    <div style="background: white" class="flex-c w80">
        <h2>[[${post.title}]]</h2>
        <div class="flex-box justify-content-start border-bottom">
            <p class="margin-right-10" th:text="${post.nickname}"></p>
            <p class="margin-right-10" th:text="${#temporals.format(post.createTime, 'yyyy/MM/dd HH:mm')}"></p>
            조회수 : <span th:text="${post.hits}"></span>
        </div>

        <div class="flex-box justify-content-end" th:if="${session.loginUser eq post.nickname or userType eq 'ADMIN'}">
            <a th:href="@{/post/update/{id}(id = ${post.id})}" class="btn btn-primary">수정</a>
            <a th:href="@{/post/delete/{id}(id = ${post.id})}" class="btn btn-danger">삭제</a>
        </div>

        <div class="flex-box justify-content-end" th:unless="${session.loginUser eq post.nickname or userType eq 'ADMIN'}">
            <button class="btn btn-danger" th:onclick="|postReport(${post.id})|">신고</button>
        </div>

        <hr>
        <div class="form-group">
            <div class="col-md-12 read" th:utext="${post.content}"></div>
        </div>

        <div class="flex-c align-items-center justify-content-center border-bottom-3px">
            <button class="btn-link" th:onclick="|clickRecommend(${post.id})|">
                <img src="../../static/icon/icons8-volunteering-64.png" th:src="@{/icon/icons8-volunteering-64.png}">
            </button>
            <p id="recommendedNumber" th:text="${post.recommendedNumber}">0</p>
        </div>

        <h2 id="commentNums" >댓글 [[${commentNums}]]개</h2>

        <div id="comments">
            <div class="card mb-3"
                 th:each="commentDTO : ${comments}"
                 th:id="|comment${commentDTO.id}|">
                <div class="card-body">

                    <!-- ① 닉네임(h5) + 오른쪽 끝 드롭다운 (position:absolute 사용) -->
                    <div class="d-flex align-items-center mb-2" style="position: relative;">
                        <h5 class="mb-0 text-primary" th:text="${commentDTO.nickname}" style="margin-right: 0.5rem;">닉네임</h5>
                        <div class="dropdown" style="position: absolute; right: 0;">
                            <button
                                    class="btn btn-sm btn-outline-secondary dropdown-toggle p-1"
                                    type="button"
                                    id="dropdownMenuButton${commentDTO.id}"
                                    data-bs-toggle="dropdown"
                                    aria-expanded="false"
                            >
                                &#8942;
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end py-0" aria-labelledby="dropdownMenuButton${commentDTO.id}">
                                <li th:if="${session.loginUser eq commentDTO.nickname or userType eq 'ADMIN'}">
                                    <a
                                            class="dropdown-item text-danger"
                                            href="#"
                                            th:onclick="|clickDelete(${commentDTO.id}, ${commentNums})|"
                                    >
                                        삭제
                                    </a>
                                </li>
                                <li>
                                    <a
                                            class="dropdown-item"
                                            href="#"
                                            th:onclick="|clickReport(${commentDTO.id})|"
                                    >
                                        신고
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>

                    <!-- ② 본문 -->
                    <div th:if="${commentDTO.report >= 10}">
                        <p class="text-muted mb-2">블라인드 처리된 댓글입니다.</p>
                    </div>
                    <div th:unless="${commentDTO.report >= 10}">
                        <p class="card-text mb-2" th:text="${commentDTO.content}">댓글 내용</p>
                    </div>

                    <div class="d-flex justify-content-end gap-1 mb-1">
                        <button class="btn btn-sm btn-outline-success" th:onclick="|commentUp(${commentDTO.id})|">
                            👍 <span th:id="|up${commentDTO.id}|" th:text="${commentDTO.up}">0</span>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" th:onclick="|commentDown(${commentDTO.id})|">
                            👎 <span th:id="|down${commentDTO.id}|" th:text="${commentDTO.down}">0</span>
                        </button>
                        <button class="btn btn-sm btn-outline-primary" th:onclick="|toggleReplyInput(${commentDTO.id})|">
                            답글
                        </button>
                    </div>

                    <!-- ④ 답글 n개 버튼 (답글 개수 옆에 ▶ 아이콘 추가) -->
                    <div th:if="${commentDTO.reply > 0}">
                        <button
                                class="btn btn-sm btn-link mb-1"
                                th:id="|toggleReplyBtn${commentDTO.id}|"
                                th:onclick="|toggleReplies(${commentDTO.id})|"
                        >
                            ▶ 답글 [[${commentDTO.reply}]]개
                        </button>
                    </div>

                    <!-- ⑤ 대댓글 입력창 (초기 숨김) -->
                    <div
                            class="mt-3 d-flex w-100"
                            th:id="|replyInputBox${commentDTO.id}|"
                            style="display: none;"
                    >
    <textarea
            class="form-control flex-grow-1 me-2"
            th:id="|replyInput${commentDTO.id}|"
            placeholder="답글을 입력해주세요"
    ></textarea>
                        <button
                                class="btn btn-outline-primary"
                                th:onclick="|addReplyComment(${commentDTO.id})|"
                        >
                            작성
                        </button>
                    </div>

                    <!-- ⑥ 대댓글 목록 컨테이너 -->
                    <div class="mt-2" th:id="|replies${commentDTO.id}|"></div>

                </div>
            </div>
        </div>

        <div>

            <div class="flex-box">
                <textarea id="newComment" class="form-control col-md-11 h-100" placeholder="댓글을 입력해주세요."></textarea>
                <button class="col-md-1 h-100" th:onclick="|addComment(${post.id})|">작성</button>
            </div>

        </div>

</div>


    <script th:inline="javascript">

        let postId = [[${post.id}]];
        let loginUser = [[${session.loginUser}]];
        let userType  = [[${userType}]];

        function showComments(postId) {

            console.log(loginUser);
            console.log(userType);

            $.ajax({
                url: "/comment/" + postId,
                type: "GET",
                success: function(data) {
                    // 댓글 컨테이너 비우기
                    $("#comments").empty();
                    // 댓글 개수 업데이트
                    $("#commentNums").text("댓글 " + data.length + "개");

                    data.forEach(function(commentDTO) {
                        const html = `
              <div class="card mb-3" id="comment${commentDTO.id}">
                <div class="card-body">

                  <!-- 1) 카드 헤더: 닉네임 + 우측 끝 드롭다운 -->
                  <div class="d-flex align-items-center mb-2" style="position: relative;">
                    <h5 class="mb-0 text-primary" style="margin-right: 0.5rem;">
                      ${commentDTO.nickname}
                    </h5>
                    <div class="dropdown" style="position: absolute; right: 0;">
                      <button
                        class="btn btn-sm btn-outline-secondary dropdown-toggle p-1"
                        type="button"
                        id="dropdownMenuButton${commentDTO.id}"
                        data-bs-toggle="dropdown"
                        aria-expanded="false"
                      >
                        &#8942;
                      </button>
                      <ul class="dropdown-menu dropdown-menu-end py-0" aria-labelledby="dropdownMenuButton${commentDTO.id}">
                        <!-- 삭제: 작성자 또는 관리자만 표시 -->
                        ${(loginUser === commentDTO.nickname || userType === 'ADMIN')
                            ? `<li>
                               <a
                                 class="dropdown-item text-danger"
                                 href="#"
                                 onclick="clickDelete(${commentDTO.id}, ${data.length})"
                               >
                                 삭제
                               </a>
                             </li>`
                            : ``
                        }
                        <!-- 신고: 항상 표시 -->
                        <li>
                          <a
                            class="dropdown-item"
                            href="#"
                            onclick="clickReport(${commentDTO.id})"
                          >
                            신고
                          </a>
                        </li>
                      </ul>
                    </div>
                  </div>

                  <!-- 2) 본문: 신고 횟수에 따른 블라인드 처리 -->
                  ${commentDTO.report >= 10
                            ? `<p class="text-muted mb-2">블라인드 처리된 댓글입니다.</p>`
                            : `<p class="card-text mb-2">${commentDTO.content}</p>`
                        }

                  <!-- 3) up/down + 답글 버튼 (gap-1, mb-1) -->
                  <div class="d-flex justify-content-end gap-1 mb-1">
                    <button class="btn btn-sm btn-outline-success" onclick="commentUp(${commentDTO.id})">
                      👍 <span id="up${commentDTO.id}">${commentDTO.up}</span>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="commentDown(${commentDTO.id})">
                      👎 <span id="down${commentDTO.id}">${commentDTO.down}</span>
                    </button>
                    <button class="btn btn-sm btn-outline-primary" onclick="toggleReplyInput(${commentDTO.id})">
                      답글
                    </button>
                  </div>

                  <!-- 4) 답글 n개 버튼 (▶ 포함) -->
                  ${commentDTO.reply > 0
                            ? `<button
                         class="btn btn-sm btn-link mb-1"
                         id="toggleReplyBtn${commentDTO.id}"
                         onclick="toggleReplies(${commentDTO.id})"
                       >
                         ▶ 답글 ${commentDTO.reply}개
                       </button>`
                            : ``
                        }

                  <!-- 5) 대댓글 입력창 (초기 숨김) -->
                  <div class="mt-3 d-flex w-100"
                       id="replyInputBox${commentDTO.id}"
                       style="display: none;"
                  >
                    <textarea
                      class="form-control flex-grow-1 me-2"
                      id="replyInput${commentDTO.id}"
                      placeholder="답글을 입력해주세요"
                    ></textarea>
                    <button
                      class="btn btn-outline-primary"
                      onclick="addReplyComment(${commentDTO.id})"
                    >
                      작성
                    </button>
                  </div>

                  <!-- 6) 대댓글 목록 컨테이너 (초기 숨김) -->
                  <div class="mt-2" id="replies${commentDTO.id}" style="display: none;"></div>

                </div>
              </div>
            `;
                        console.log(commentDTO.nickname);
                        $("#comments").append(html);
                    });
                },
                error: function() {
                    alert("댓글을 불러오는 데 실패했습니다.");
                }
            });
        }


        function clickRecommend(id) {
            $.ajax({
                url: "/post/recommend/" + id,
                type: "GET",

                success: function (data){
                    console.log(data);
                    $("#recommendedNumber").text(data);
                }
            })


        }


        function clickReport(id){


            if (!confirm("해당 댓글을 신고하시겠습니까?")) {
                return;
            }


            $.ajax({
                url: "/comment/report/" + id,
                type: "PATCH",


                success: function (data){
                    alert(data);
                }
            })


        }

        function postReport(id){


            if (!confirm("해당 게시글을 신고하시겠습니까?")) {
                return;
            }


            $.ajax({
                url: "/post/report/" + id,
                type: "PATCH",


                success: function (data){
                    alert(data);
                }
            })


        }

        function addComment(id){

            let content = document.getElementById("newComment").value;

            let comment = new Object();

            console.log(content)

            if (content.length == 0) {
                alert("댓글을 입력해주세요");
                return;
            }

            comment.content = content;

            console.log(JSON.stringify(comment));

            $.ajax({
                url: "/comment/" + id,
                type: "POST",
                data: JSON.stringify(comment),
                contentType: "application/json; charset=uft-8",

                success: function (data) {
                    console.log(data);
                    showComments(id);
                    document.getElementById("newComment").value = null;

                }

            })

        }

        function clickDelete(id) {

            if (!confirm("해당 댓글을 삭제하시겠습니까?")) {
                return;
            }


            console.log(id);

            $.ajax({
                url: "/comment/" + id,
                type: "DELETE",


                success: function (data){
                    alert(data);
                    showComments(postId)
                }
            })


        }

        function commentUp(id){

            $.ajax({
                url: "/comment/upButton/" + id,
                type: "GET",

                success: function (data){
                    console.log(data);
                    if (data.dup) {
                        alert("이미 down을 누른 댓글입니다.");
                        return;
                    }

                    document.getElementById("up" + id).innerHTML = "<span>" + data.upCount + "</span>";
                }


            })


        }

        function commentDown(id){

            $.ajax({
                url: "/comment/downButton/" + id,
                type: "GET",

                success: function (data){
                    console.log(data);

                    if (data.dup) {
                        alert("이미 up을 누른 댓글입니다.");
                        return;
                    }

                    document.getElementById("down" + id).innerHTML = "<span>" + data.downCount + "</span>";
                }

            })


        }

        function toggleReplyInput(commentId) {
            const box = document.getElementById("replyInputBox" + commentId);
            if (box.style.display === "none") {
                box.style.display = "block";
            } else {
                box.style.display = "none";
            }
        }

        // ⑪ 대댓글 전체를 불러와 렌더링하는 함수
        function loadReplies(commentId) {
            const container = document.getElementById("replies" + commentId);
            $.ajax({
                url: "/comment/" + commentId + "/replies",
                type: "GET",
                success: function(data) {
                    container.innerHTML = "";

                    data.forEach(function(reply) {
                        const replyHtml = `
              <div class="card reply-card mb-2 ms-2" id="reply${reply.id}">
                <div class="card-body py-2 px-3">

                  <!-- 헤더: 닉네임 + 드롭다운 -->
                  <div class="d-flex align-items-center mb-1" style="position: relative;">
                    <h5 class="mb-0 text-secondary" style="margin-right: 0.5rem;">
                      ${reply.nickname}
                    </h5>
                    <div class="dropdown" style="position: absolute; right: 0;">
                      <button
                        class="btn btn-sm btn-outline-secondary dropdown-toggle p-1"
                        type="button"
                        id="dropdownReply${reply.id}"
                        data-bs-toggle="dropdown"
                        aria-expanded="false"
                      >
                        &#8942;
                      </button>

                      <ul class="dropdown-menu dropdown-menu-end py-0" aria-labelledby="dropdownReply${reply.id}">
                        <!-- 삭제: 대댓글 작성자 또는 관리자만 표시 -->
                        ${(loginUser === reply.nickname || userType === 'ADMIN')
                            ? `<li>
                               <a
                                 class="dropdown-item text-danger"
                                 href="#"
                                 onclick="clickDelete(${reply.id})"
                               >
                                 삭제
                               </a>
                             </li>`
                            : ``
                        }
                        <!-- 신고: 항상 표시 -->
                        <li>
                          <a
                            class="dropdown-item"
                            href="#"
                            onclick="clickReport(${reply.id})"
                          >
                            신고
                          </a>
                        </li>
                      </ul>
                    </div>
                  </div>

                  <!-- 본문 -->
                  ${reply.report >= 10
                            ? `<p class="text-muted mb-2">블라인드 처리된 댓글입니다.</p>`
                            : `<p class="mb-2">${reply.content}</p>`
                        }

                  <!-- 좋아요/싫어요 -->
                  <div class="d-flex justify-content-end gap-1">
                    <button class="btn btn-sm btn-outline-success" onclick="commentUp(${reply.id})">
                      👍 <span id="up${reply.id}">${reply.up}</span>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="commentDown(${reply.id})">
                      👎 <span id="down${reply.id}">${reply.down}</span>
                    </button>
                  </div>

                </div>
              </div>
            `;
                        container.insertAdjacentHTML("beforeend", replyHtml);
                    });

                    // 대댓글 컨테이너 보이기
                    container.style.display = "block";

                    // 답글 n개 버튼 화살표 ▼로 변경
                    const replyBtn = document.getElementById("toggleReplyBtn" + commentId);
                    if (replyBtn) {
                        const parts = replyBtn.innerText.split(" ");
                        const countText = parts.slice(-2).join(" ");
                        replyBtn.innerText = `▼ ${countText}`;
                    }
                },
                error: function() {
                    alert("대댓글 불러오기에 실패했습니다.");
                }
            });
        }

        // ② 토글 로직: 닫혀 있으면 loadReplies, 열려 있으면 닫기
        function toggleReplies(commentId) {
            const container = document.getElementById("replies" + commentId);
            const replyBtn = document.getElementById("toggleReplyBtn" + commentId);
            const isVisible = container.style.display === "block";

            if (isVisible) {
                // 닫기
                container.style.display = "none";
                if (replyBtn) {
                    const parts = replyBtn.innerText.split(" ");
                    const countText = parts.slice(-2).join(" ");
                    replyBtn.innerText = `▶ ${countText}`;
                }
            } else {
                // 열기
                loadReplies(commentId);
            }
        }

        // ③ 대댓글 작성 후 토글 버튼과 목록을 적절히 업데이트
        function addReplyComment(parentId) {
            const content = document.getElementById("replyInput" + parentId).value;
            if (!content.trim()) {
                alert("답글을 입력해주세요.");
                return;
            }

            const comment = { content: content, parentId: parentId };

            $.ajax({
                url: "/comment/" + parentId + "/reply",
                type: "POST",
                data: JSON.stringify(comment),
                contentType: "application/json; charset=utf-8",
                success: function() {
                    // 1) 입력창 비우기
                    document.getElementById("replyInput" + parentId).value = "";

                    // 2) '답글 n개' 버튼 생성 또는 개수 증가
                    const replyBtnId = "toggleReplyBtn" + parentId;
                    let replyBtn = document.getElementById(replyBtnId);
                    if (!replyBtn) {
                        // 첫 답글: ▶ 답글 1개 버튼 생성
                        const btnHtml = `
                  <button
                    type="button"
                    class="btn btn-sm btn-link mb-1"
                    id="${replyBtnId}"
                    onclick="toggleReplies(${parentId})"
                  >
                    ▶ 답글 1개
                  </button>
                `;
                        const parentCard = document.getElementById(`comment${parentId}`);
                        const upDownContainer = parentCard.querySelector(".d-flex.justify-content-end.gap-1.mb-1");
                        upDownContainer.insertAdjacentHTML("afterend", btnHtml);
                    } else {
                        // 기존 버튼: 개수만 1 증가, 화살표 ▶ 유지
                        const parts = replyBtn.innerText.match(/답글\s(\d+)개/);
                        if (parts) {
                            const newCount = parseInt(parts[1], 10) + 1;
                            replyBtn.innerText = `▶ 답글 ${newCount}개`;
                        }
                    }

                    // 3) 현재 대댓글 목록이 열려 있으면 새로고침
                    const container = document.getElementById("replies" + parentId);
                    if (container.style.display === "block") {
                        loadReplies(parentId);
                    }
                },
                error: function() {
                    alert("답글 작성에 실패했습니다.");
                }
            });
        }

    </script>

</html>
